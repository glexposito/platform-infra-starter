name: Deploy App
run-name: Deploy App (${{ inputs.environment }} / ${{ inputs.command }})

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - prod
      command:
        description: "Terraform command"
        required: true
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write

env:
  TERRAFORM_VERSION: "1.14.7"

jobs:
  prepare_deployment:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      environment_name: ${{ steps.resolve.outputs.environment_name }}
      app_tfvars: ${{ steps.resolve.outputs.app_tfvars }}
      app_backend_config: ${{ steps.resolve.outputs.app_backend_config }}
    steps:
      - name: Resolve deployment config
        id: resolve
        env:
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import sys

          environment = os.environ["INPUT_ENVIRONMENT"]

          env_mapping = {
              "dev": {
                  "environment_name": "dev",
                  "app_tfvars": "env/dev.app.tfvars",
                  "app_backend_config": "backend/dev.app.hcl",
              },
              "prod": {
                  "environment_name": "prod",
                  "app_tfvars": "env/prod.app.tfvars",
                  "app_backend_config": "backend/prod.app.hcl",
              },
          }

          if environment not in env_mapping:
              print(f"Unsupported environment: {environment}", file=sys.stderr)
              sys.exit(1)

          for key, value in env_mapping[environment].items():
              print(f"{key}={value}")
          PY

  deploy:
    needs: prepare_deployment
    runs-on: ubuntu-latest
    name: Deploy App (${{ needs.prepare_deployment.outputs.environment_name }})
    environment: ${{ needs.prepare_deployment.outputs.environment_name }}
    concurrency:
      group: app-deploy-${{ needs.prepare_deployment.outputs.environment_name }}
      cancel-in-progress: false
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        working-directory: app
        run: terraform init -backend-config="../${{ needs.prepare_deployment.outputs.app_backend_config }}"

      - name: Terraform plan
        working-directory: app
        run: terraform plan -var-file="../${{ needs.prepare_deployment.outputs.app_tfvars }}"

      - name: Terraform apply
        if: inputs.command == 'apply'
        working-directory: app
        run: terraform apply -auto-approve -var-file="../${{ needs.prepare_deployment.outputs.app_tfvars }}"
